<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHSAT Fiction Reading · AEexam</title>
<style>
:root{
  --paper:#F5F0E2;
  --page:#FDFBF3;
  --ink:#26231C;
  --faded:#6E675A;
  --pine:#1E5A4E;
  --pine-soft:#E4EDE7;
  --madder:#A63A2B;
  --madder-soft:#F6E7E1;
  --brass:#8F6E1F;
  --rule:#D9D0BA;
  --serif:Georgia,'Times New Roman',Times,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--serif);
  font-size:17px;
  line-height:1.55;
}
button{font-family:var(--sans);cursor:pointer}
.hidden{display:none!important}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:20;
  background:var(--pine);color:#F3EFE2;
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  box-shadow:0 1px 0 rgba(0,0,0,.18);
}
.topbar .brand{
  font-family:var(--serif);font-size:17px;letter-spacing:.4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar .brand b{font-weight:700}
.backbtn{
  background:rgba(255,255,255,.12);color:#F3EFE2;
  border:1px solid rgba(255,255,255,.35);border-radius:6px;
  padding:6px 12px;font-size:13px;letter-spacing:.3px;
}
.backbtn:hover{background:rgba(255,255,255,.22)}
.topbar .progress{
  margin-left:auto;font-family:var(--sans);font-size:12px;
  letter-spacing:.6px;opacity:.85;white-space:nowrap;
}

/* ---------- table of contents ---------- */
.cover{max-width:760px;margin:0 auto;padding:40px 20px 80px}
.cover-head{
  text-align:center;border-bottom:3px double var(--rule);
  padding-bottom:26px;margin-bottom:8px;
}
.cover-head .eyebrow{
  font-family:var(--sans);font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--brass);margin-bottom:14px;
}
.cover-head h1{
  font-size:clamp(30px,6vw,44px);font-weight:400;letter-spacing:.5px;
  line-height:1.15;
}
.cover-head h1 em{font-style:italic}
.cover-head .sub{
  margin-top:12px;color:var(--faded);font-size:15px;font-style:italic;
}
.cover-meta{
  display:flex;justify-content:center;gap:24px;
  font-family:var(--sans);font-size:12px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--faded);
  padding:14px 0 26px;border-bottom:1px solid var(--rule);
  margin-bottom:26px;flex-wrap:wrap;
}
.toc-list{list-style:none}
.toc-item{
  display:flex;align-items:center;gap:16px;
  background:var(--page);border:1px solid var(--rule);
  border-radius:10px;padding:16px 18px;margin-bottom:12px;
  cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
  position:relative;overflow:hidden;
}
.toc-item:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(38,35,28,.10)}
.toc-item:focus-visible{outline:3px solid var(--pine);outline-offset:2px}
.toc-item .num{
  font-family:var(--serif);font-size:20px;color:var(--brass);
  min-width:44px;text-align:center;font-style:italic;
}
.toc-item .titles{flex:1;min-width:0}
.toc-item .titles .t{font-size:18px;letter-spacing:.2px}
.toc-item .titles .fl{
  font-size:13px;color:var(--faded);font-style:italic;margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.toc-item .chip{
  font-family:var(--sans);font-size:11px;letter-spacing:.5px;
  border:1px solid var(--rule);border-radius:20px;padding:4px 10px;
  color:var(--faded);white-space:nowrap;
}
.toc-item .chip.done{
  background:var(--pine-soft);border-color:var(--pine);color:var(--pine);font-weight:600;
}
.toc-item .ribbon{
  position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;
}
.toc-item.completed .ribbon{background:var(--pine)}
.cover-foot{
  margin-top:34px;text-align:center;font-family:var(--sans);
  font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--faded);
}

.toc-section{
  font-family:var(--sans);font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--brass);
  margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--rule);
}
.poem-body.prose{max-width:640px}
.poem-body.prose .pline{margin-bottom:12px;align-items:flex-start}
.poem-body.prose .txt{font-size:16px;line-height:1.7}
.poem-body.prose .ln{transform:none;padding-top:4px}

/* ---------- passage view ---------- */
.reader{
  display:grid;grid-template-columns:46% 54%;
  height:calc(100vh - 49px);
}
.pane{overflow-y:auto;overscroll-behavior:contain}
.pane-poem{
  background:var(--page);
  border-right:1px solid var(--rule);
  padding:34px 30px 70px 26px;
}
.pane-q{padding:30px 26px 90px}

.poem-head{margin-bottom:26px;text-align:center}
.poem-head .eyebrow{
  font-family:var(--sans);font-size:10px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--brass);margin-bottom:10px;
}
.poem-head h2{font-size:26px;font-weight:400;letter-spacing:.3px}
.poem-head .byline{
  font-style:italic;color:var(--faded);font-size:15px;margin-top:6px;
}
.poem-body{max-width:520px;margin:0 auto}
.pline{
  display:flex;gap:14px;align-items:baseline;
  padding:1px 0;
}
.pline .ln{
  font-family:var(--sans);font-size:11px;color:var(--brass);
  min-width:26px;text-align:right;flex-shrink:0;
  transform:translateY(-1px);
}
.pline .txt{font-size:16.5px;line-height:1.62}
.pline.stanza-break{margin-top:18px}
.ppara{display:flex;gap:14px;align-items:baseline;margin-bottom:15px}
.ppara .pn{
  font-family:var(--sans);font-size:11px;color:var(--brass);
  min-width:26px;text-align:right;flex-shrink:0;transform:translateY(-1px);
}
.ppara .txt{font-size:16px;line-height:1.68}
.poem-notes{
  max-width:520px;margin:30px auto 0;padding-top:14px;
  border-top:1px solid var(--rule);
  font-size:13.5px;color:var(--faded);
}
.poem-notes p{margin-bottom:4px}
.poem-notes b{color:var(--ink)}

.q-instructions{
  font-family:var(--sans);font-size:12.5px;color:var(--faded);
  border:1px dashed var(--rule);border-radius:8px;
  padding:10px 14px;margin-bottom:22px;background:var(--page);
}
.qcard{
  background:var(--page);border:1px solid var(--rule);border-radius:10px;
  padding:18px 18px 14px;margin-bottom:16px;
}
.qcard .qnum{
  font-family:var(--sans);font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--brass);margin-bottom:8px;
}
.qcard .qtext{font-size:16.5px;margin-bottom:8px}
.qcard .qquote{
  border-left:3px solid var(--rule);padding:6px 12px;margin:8px 0 12px;
  font-size:15.5px;font-weight:700;line-height:1.5;
}
.opt{
  display:flex;gap:12px;align-items:flex-start;
  padding:9px 10px;border-radius:8px;cursor:pointer;
  border:1px solid transparent;margin:2px 0;
  transition:background .1s ease;
}
.opt:hover{background:rgba(30,90,78,.06)}
.opt input{position:absolute;opacity:0;pointer-events:none}
.opt .letter{
  font-family:var(--serif);font-size:14px;font-weight:700;
  width:26px;height:26px;border:1.5px solid var(--faded);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:var(--faded);transform:translateY(1px);
  transition:all .12s ease;
}
.opt .otext{font-size:15.5px;line-height:1.5;padding-top:2px}
.opt.selected{border-color:var(--pine);background:rgba(30,90,78,.07)}
.opt.selected .letter{background:var(--pine);border-color:var(--pine);color:#fff}
/* graded states — the "pencil circle" */
.qcard.graded .opt{cursor:default}
.qcard.graded .opt:hover{background:transparent}
.qcard.graded .opt.selected:not(.is-correct){border-color:var(--madder);background:var(--madder-soft)}
.qcard.graded .opt.selected:not(.is-correct) .letter{background:var(--madder);border-color:var(--madder)}
.qcard.graded .opt.selected:not(.is-correct) .otext{text-decoration:line-through;text-decoration-color:var(--madder);text-decoration-thickness:1.5px;color:var(--faded)}
.qcard.graded .opt.is-correct{
  border-color:var(--pine);background:var(--pine-soft);
}
.qcard.graded .opt.is-correct .letter{
  background:transparent;border:2.5px solid var(--pine);color:var(--pine);
  border-radius:46% 54% 52% 48% / 52% 48% 55% 45%;
}
.verdict{
  font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.8px;
  margin-top:8px;
}
.verdict.ok{color:var(--pine)}
.verdict.bad{color:var(--madder)}
.explain{
  margin-top:8px;padding:10px 12px;border-radius:8px;
  background:rgba(143,110,31,.08);border-left:3px solid var(--brass);
  font-size:14px;color:#4d4636;line-height:1.5;
}
.checkrow{margin:26px 0 10px;display:flex;flex-direction:column;gap:12px}
.bigbtn{
  background:var(--pine);color:#F3EFE2;border:none;border-radius:8px;
  padding:14px 18px;font-size:15px;letter-spacing:.5px;font-weight:600;
  width:100%;
}
.bigbtn:hover{filter:brightness(1.08)}
.bigbtn:disabled{opacity:.45;cursor:not-allowed}
.bigbtn.secondary{
  background:transparent;color:var(--pine);border:1.5px solid var(--pine);
}
.scorecard{
  background:var(--page);border:2px solid var(--pine);border-radius:12px;
  padding:20px;text-align:center;
}
.scorecard .big{font-size:34px;color:var(--pine)}
.scorecard .lbl{
  font-family:var(--sans);font-size:11px;letter-spacing:2px;
  text-transform:uppercase;color:var(--faded);margin-top:4px;
}
.scorecard .msg{margin-top:10px;font-style:italic;color:var(--faded);font-size:14.5px}

/* mobile tab toggle */
.mtabs{display:none}
@media (max-width:860px){
  .reader{display:block;height:auto}
  .pane{overflow:visible}
  .pane-poem{border-right:none;padding:26px 18px 40px}
  .pane-q{padding:22px 16px 80px}
  .mtabs{
    display:flex;position:sticky;top:49px;z-index:15;
    background:var(--paper);border-bottom:1px solid var(--rule);
  }
  .mtabs button{
    flex:1;padding:12px;background:transparent;border:none;
    font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--faded);
    border-bottom:3px solid transparent;
  }
  .mtabs button.active{color:var(--pine);border-bottom-color:var(--pine);font-weight:700}
  .mob-hide{display:none}
}
@media (min-width:861px){
  .pane{height:100%}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>

<header class="topbar">
  <button class="backbtn hidden" id="btnBack">&#8592; Contents</button>
  <div class="brand" id="brandTitle"><b>SHSAT Fiction Reading</b> &middot; AEexam</div>
  <div class="progress" id="topProgress"></div>
</header>

<nav class="mtabs hidden" id="mtabs">
  <button id="tabPoem" class="active">Poem</button>
  <button id="tabQ">Questions</button>
</nav>

<main id="viewTOC" class="cover"></main>

<main id="viewReader" class="reader hidden">
  <section class="pane pane-poem" id="paneP"></section>
  <section class="pane pane-q" id="paneQ"></section>
</main>

<script>
/* ================= app state ================= */
var state = { current: null, answers: {}, graded: {}, scores: {} };

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function letters(qIdx){ return (qIdx % 2 === 0) ? ["A","B","C","D"] : ["E","F","G","H"]; }

/* ================= TOC ================= */
function renderTOC(){
  var el = document.getElementById("viewTOC");
  var poems = [], prose = [];
  PASSAGES.forEach(function(p){ (p.kind === "prose" ? prose : poems).push(p); });
  var done = Object.keys(state.scores).length;
  var romans = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV"];
  function item(p, label){
    var sc = state.scores[p.n];
    var chip = (sc !== undefined)
      ? '<span class="chip done">' + sc + ' / ' + p.questions.length + '</span>'
      : '<span class="chip">' + p.questions.length + ' questions</span>';
    return '<li><button class="toc-item' + (sc !== undefined ? ' completed' : '') + '" data-n="' + p.n + '">'
      + '<span class="ribbon"></span>'
      + '<span class="num">' + label + '</span>'
      + '<span class="titles"><span class="t">' + esc(p.title) + '</span>'
      + '<span class="fl">&ldquo;' + esc(p.lines[0].replace(/\|/g,"").slice(0,90)) + '&rdquo;</span></span>'
      + chip
      + '</button></li>';
  }
  var html = ''
    + '<div class="cover-head">'
    + '  <div class="eyebrow">AEexam &middot; English Language Arts</div>'
    + '  <h1>SHSAT Fiction Reading</h1>'
    + '  <div class="sub">Twelve original poems and five original prose passages, with practice questions in the style of the SHSAT</div>'
    + '</div>'
    + '<div class="cover-meta">'
    + '  <span>' + poems.length + ' poems</span>'
    + '  <span>' + prose.length + ' prose passages</span>'
    + '  <span>' + (PASSAGES.length * 10) + ' questions</span>'
    + '  <span>' + done + ' / ' + PASSAGES.length + ' completed</span>'
    + '</div>';
  html += '<div class="toc-section">Part One &middot; Poetry</div><ul class="toc-list">';
  poems.forEach(function(p, i){ html += item(p, romans[i]); });
  html += '</ul><div class="toc-section">Part Two &middot; Prose Fiction</div><ul class="toc-list">';
  prose.forEach(function(p, i){ html += item(p, String(i + 1)); });
  html += '</ul><div class="cover-foot">Original passages &amp; questions &middot; AE Group</div>';
  el.innerHTML = html;
  el.querySelectorAll(".toc-item").forEach(function(btn){
    btn.addEventListener("click", function(){ openPassage(parseInt(btn.getAttribute("data-n"),10)); });
  });
}

/* ================= passage view ================= */
function openPassage(n){
  state.current = n;
  if (!state.answers[n]) state.answers[n] = {};
  state.graded[n] = state.graded[n] || false;
  renderPoem();
  renderQuestions();
  document.getElementById("viewTOC").classList.add("hidden");
  document.getElementById("viewReader").classList.remove("hidden");
  document.getElementById("btnBack").classList.remove("hidden");
  document.getElementById("mtabs").classList.remove("hidden");
  setTab("poem");
  updateTop();
  document.getElementById("paneP").scrollTop = 0;
  document.getElementById("paneQ").scrollTop = 0;
  window.scrollTo(0,0);
}

function getPassage(n){
  for (var i=0;i<PASSAGES.length;i++){ if (PASSAGES[i].n === n) return PASSAGES[i]; }
  return null;
}

function renderPoem(){
  var p = getPassage(state.current);
  var isProse = (p.kind === "prose");
  var same = PASSAGES.filter(function(x){ return ((x.kind === "prose") === isProse); });
  var pos = 0;
  same.forEach(function(x, i){ if (x.n === p.n) pos = i + 1; });
  var html = '<div class="poem-head">'
    + '<div class="eyebrow">Passage ' + pos + ' of ' + same.length + ' &middot; ' + (isProse ? 'Prose Fiction' : 'Poetry') + '</div>'
    + '<h2>' + esc(p.title) + '</h2>'
    + '<div class="byline">' + esc(p.byline) + '</div>'
    + '</div><div class="poem-body' + (isProse ? ' prose' : '') + '">';
  var lineNo = 0;
  p.lines.forEach(function(raw){
    var stanzaBreak = raw.charAt(0) === "|";
    var text = stanzaBreak ? raw.slice(1) : raw;
    lineNo++;
    var showNum = isProse ? true : (lineNo % 5 === 0);
    html += '<div class="pline' + ((stanzaBreak && !isProse) ? ' stanza-break' : '') + '">'
      + '<span class="ln">' + (showNum ? lineNo : "") + '</span>'
      + '<span class="txt">' + esc(text) + '</span></div>';
  });
  html += '</div>';
  if (p.notes && p.notes.length){
    html += '<div class="poem-notes">';
    p.notes.forEach(function(nt){ html += '<p>' + nt + '</p>'; });
    html += '</div>';
  }
  document.getElementById("paneP").innerHTML = html;
}

function renderQuestions(){
  var p = getPassage(state.current);
  var graded = state.graded[p.n];
  var ans = state.answers[p.n];
  var html = '<div class="q-instructions">Read the poem on the left, then answer questions 1&ndash;'
    + p.questions.length + '. Select one answer per question and press <b>Check answers</b>.</div>';
  p.questions.forEach(function(q, qi){
    var L = letters(qi);
    var chosen = ans[qi];
    html += '<div class="qcard' + (graded ? ' graded' : '') + '" id="qc' + qi + '">'
      + '<div class="qnum">Question ' + (qi+1) + '</div>'
      + '<div class="qtext">' + q.q + '</div>';
    if (q.quote){ html += '<div class="qquote">' + q.quote + '</div>'; }
    q.opts.forEach(function(op, oi){
      var cls = "opt";
      if (chosen === oi) cls += " selected";
      if (graded && oi === q.a) cls += " is-correct";
      html += '<label class="' + cls + '" data-q="' + qi + '" data-o="' + oi + '">'
        + '<input type="radio" name="q' + qi + '"' + (chosen === oi ? " checked" : "") + (graded ? " disabled" : "") + '>'
        + '<span class="letter">' + L[oi] + '</span>'
        + '<span class="otext">' + op + '</span></label>';
    });
    if (graded){
      var ok = (chosen === q.a);
      html += '<div class="verdict ' + (ok ? "ok" : "bad") + '">'
        + (ok ? "&#10003; CORRECT" : (chosen === undefined ? "&#9675; NOT ANSWERED &middot; correct: " + letters(qi)[q.a] : "&#10007; INCORRECT &middot; correct: " + letters(qi)[q.a]))
        + '</div>'
        + '<div class="explain">' + q.ex + '</div>';
    }
    html += '</div>';
  });
  html += '<div class="checkrow" id="checkrow">';
  if (!graded){
    html += '<button class="bigbtn" id="btnCheck">Check answers</button>';
  } else {
    var sc = state.scores[p.n];
    var pct = Math.round(100 * sc / p.questions.length);
    var msg = pct === 100 ? "Perfect score. Ready for test day."
      : pct >= 80 ? "Strong work. Review the explanations for the ones you missed."
      : pct >= 60 ? "A solid base. Reread the poem, then revisit the missed questions."
      : "Read the explanations carefully, then try the next passage with fresh eyes.";
    html += '<div class="scorecard"><div class="big">' + sc + ' / ' + p.questions.length + '</div>'
      + '<div class="lbl">score &middot; ' + pct + '%</div>'
      + '<div class="msg">' + msg + '</div></div>';
    html += '<button class="bigbtn secondary" id="btnRetry">Clear &amp; retry this passage</button>';
    var idx = PASSAGES.findIndex(function(x){ return x.n === p.n; });
    if (idx < PASSAGES.length - 1){
      html += '<button class="bigbtn" id="btnNext">Next passage &rarr;</button>';
    } else {
      html += '<button class="bigbtn" id="btnHome">Back to contents</button>';
    }
  }
  html += '</div>';
  document.getElementById("paneQ").innerHTML = html;

  if (!graded){
    document.querySelectorAll("#paneQ .opt").forEach(function(lab){
      lab.addEventListener("click", function(e){
        e.preventDefault();
        var qi = parseInt(lab.getAttribute("data-q"),10);
        var oi = parseInt(lab.getAttribute("data-o"),10);
        state.answers[p.n][qi] = oi;
        renderQuestions();
        updateTop();
      });
    });
    document.getElementById("btnCheck").addEventListener("click", function(){
      var answered = Object.keys(state.answers[p.n]).length;
      if (answered < p.questions.length){
        if (!window.confirm("You have answered " + answered + " of " + p.questions.length + " questions. Check anyway?")) return;
      }
      grade();
    });
  } else {
    var r = document.getElementById("btnRetry");
    if (r) r.addEventListener("click", function(){
      delete state.scores[p.n];
      state.answers[p.n] = {};
      state.graded[p.n] = false;
      renderQuestions(); updateTop();
      document.getElementById("paneQ").scrollTop = 0;
    });
    var nx = document.getElementById("btnNext");
    if (nx) nx.addEventListener("click", function(){
      var idx = PASSAGES.findIndex(function(x){ return x.n === p.n; });
      openPassage(PASSAGES[idx+1].n);
    });
    var hm = document.getElementById("btnHome");
    if (hm) hm.addEventListener("click", goHome);
  }
}

function grade(){
  var p = getPassage(state.current);
  var ans = state.answers[p.n];
  var sc = 0;
  p.questions.forEach(function(q, qi){ if (ans[qi] === q.a) sc++; });
  state.scores[p.n] = sc;
  state.graded[p.n] = true;
  renderQuestions();
  updateTop();
  document.getElementById("paneQ").scrollTop = 0;
  setTab("q");
}

function updateTop(){
  var el = document.getElementById("topProgress");
  if (state.current === null){
    el.textContent = "";
    return;
  }
  var p = getPassage(state.current);
  var answered = Object.keys(state.answers[p.n] || {}).length;
  el.textContent = state.graded[p.n]
    ? "Score " + state.scores[p.n] + "/" + p.questions.length
    : answered + "/" + p.questions.length + " answered";
}

function goHome(){
  state.current = null;
  document.getElementById("viewReader").classList.add("hidden");
  document.getElementById("btnBack").classList.add("hidden");
  document.getElementById("mtabs").classList.add("hidden");
  document.getElementById("viewTOC").classList.remove("hidden");
  renderTOC(); updateTop();
  window.scrollTo(0,0);

  lines:[
    "Her hands remember what her words forget.",
    "They measure flour by the weight of habit,",

    "goes smooth as river stones beneath her palms.",
    "|Those hands once threaded needles in dim light,",

    "counted out coins in a new country's colors,",
    "and learned the bus routes better than the maps.",
    "|They held my hand across the street to school,",
    "and turned the pages of two alphabets,",
    "patient with both, at home in neither one,",
    "building a bridge and walking it each day.",
    "|Now, when I visit, she forgets my questions",
    "but never once forgets to feed me first.",
    "The kettle knows her step; the cups assemble;",
    "the dough, as always, rises on the sill.",
    "|I watch her work and try to memorize",
    "the choreography of fifty years:",
    "the flick of wrist, the thumbprint in the center,",
    "the pinch that seals each dumpling like a letter",
    "mailed from her childhood to my crowded plate.",
    "|Some inheritance is money, land, or names.",
    "Mine is a motion: fold and turn, fold and turn —",
    "a language spoken hand to hand, so quiet",
    "it needs no words, and cannot be forgotten,",
    "rising in me the way the dough still rises."

  lines:[
    "Four hundred meters, quartered among four,",
    "And I am third: the one nobody films,",

    "The bridge between the beginning and the end.",

    "The way you hear a train before its light.",
    "|Then everything I've practiced shrinks to this:",
    "One backward reach, blind, at a dead sprint,",
    "Trusting a slap of metal into palm —",
    "The whole race balanced on a half a second.",
    "|They say the baton is just a hollow tube.",
    "They have not felt it land: a runner's morning laps,",
    "Her sacrificed Saturdays, her shin splints, all",
    "Compressed into three ounces of aluminum.",
    "|I run my hundred like a held-in shout.",
    "The stadium is a blur of someone's colors.",
    "My legs argue; my lungs file their complaints;",
    "I overrule them both, and reach, and give.",
    "|Fourth leg away — she flies. And I slow down",
    "Into the soft collapse all runners know,",
    "Having carried our one and only name",
    "As far as I was asked, as fast as trust."

{
  n:13, title:"The Whisper Scene", byline:"an AE original story", kind:"prose",
  lines:[
    "Nora had spent her winter break turning the school's creaky one-act play into something she was quietly proud of. She had retyped every scene, cut the dull second argument, and drawn the set on graph paper, chair by chair. Rehearsals belonged to her the way the library belonged to the librarians: not officially, but completely.",
    "Then, on the first Tuesday of the semester, Priya Raman transferred in.",
    "She arrived at rehearsal with no script and no apologies, sat in the third row for twenty minutes, and then raised her hand. \u201cWhat if the messenger doesn't leave in scene two?\u201d she asked. \u201cWhat if she stays, and hears everything she isn't supposed to hear?\u201d",
    "Ms. Calloway, who had directed the play the same way for eleven years, slowly lowered her coffee. \u201cGo on,\u201d she said.",
    "Nora felt the graph paper crumple somewhere inside her chest.",
    "By Friday, the messenger stayed. By the following week, the second argument — the one Nora had so carefully cut — was back, rewritten as a whispered scene behind a paper screen, and it was, Nora had to admit, the best thing in the play.",
    "\u201cYou don't like me,\u201d Priya said one afternoon, materializing beside the prop table where Nora was labeling a box of lanterns. It was not an accusation. It was an observation, delivered the way you might mention rain.",
    "\u201cI don't know you,\u201d said Nora.",
    "\u201cThat's fair.\u201d Priya picked up a lantern and turned it over in her hands. \u201cAt my old school I learned that if you wait politely for your turn, the play closes before your turn arrives. So I stopped waiting. It isn't personal. Your set drawings are the best I've seen from anyone our age — I told Ms. Calloway so on my first day.\u201d",
    "Nora blinked. The compliment did not fit anywhere in the story she had been telling herself, and it sat awkwardly on top of her resentment, like a hat on a fence post.",
    "\u201cThe whisper scene was your idea, structurally,\u201d Priya went on. \u201cYou cut the argument because it was dull out loud. I only put it back where it couldn't be heard. Half of that change is yours.\u201d",
    "On opening night, the whispered scene landed exactly as Priya had promised: the audience leaned forward as one body, straining after words they were never meant to catch. From the wings, Nora watched Ms. Calloway silently mouth every line, and felt her own feelings sort themselves at last — not into friendship exactly, and not into surrender, but into something she suspected was respect, which was less comfortable than either."
  ],

           "felt a deep, unofficial ownership of the production.",

           "was rarely allowed to attend rehearsals."],
     a:1, ex:"Like the librarians' claim on the library, Nora's claim was &ldquo;not official, but complete&rdquo; — she felt the play was hers."},

    {q:"The detail that Ms. Calloway &ldquo;had directed the play the same way for eleven years&rdquo; (paragraph 4) makes her response to Priya's idea",
     opts:["more surprising and significant.",
           "easy to predict.",
           "a sign of boredom with teaching.",
           "an insult to Nora."],
     a:0, ex:"When someone set in her ways for eleven years says &ldquo;Go on,&rdquo; the moment carries real weight — Priya's idea must be striking."},
    {q:"Which of Priya's traits is most central to the events of the passage?",
     opts:["her honesty about her weaknesses",
           "her talent for acting",
           "her fear of being ignored",
           "her ability to influence others"],
     a:3, ex:"In one afternoon she moves an eleven-year routine; by Friday the play has changed. Her influence drives every event."},
    {q:"Describing Priya's remark as &ldquo;delivered the way you might mention rain&rdquo; (paragraph 7) characterizes it as",
     opts:["gloomy and discouraging.",
           "calm and matter-of-fact.",
           "whispered and secretive.",
           "angry and accusing."],
     a:1, ex:"Mentioning rain is neutral small talk — Priya states &ldquo;You don't like me&rdquo; as plain fact, without heat."},
    {q:"Priya's statement that &ldquo;if you wait politely for your turn, the play closes before your turn arrives&rdquo; (paragraph 9) reveals that she",
     opts:["was expelled from her old school.",

    {q:"The simile of the compliment sitting &ldquo;like a hat on a fence post&rdquo; (paragraph 10) suggests that",
     opts:["the compliment did not fit the story Nora had built about Priya.",
           "Priya's compliment was insincere.",
           "Nora was wearing an unusual hat.",
           "the prop table was disorganized."],

{
  n:14, title:"The Two Signatures", byline:"an AE original story", kind:"prose",
  lines:[
    "The box was labeled WORKSHOP — FINAL YEAR, and Mira's job was simple: scan every page, then shred it.",
    "Her father's furniture workshop had closed when she was seven. She remembered the smell of it — cedar and machine oil — better than she remembered the closing itself, which the family discussed the way people discuss an old injury: rarely, and with a change of subject kept ready.",
    "The letter was the forty-first page in the box. It was addressed to the city licensing board, it recommended that Ruiz Woodworks be denied recertification, and it was signed, in confident blue ink, Elena Solano.",
    "Mira read the signature three times. Solano. As in Talia Solano, who had saved her a seat in homeroom on the worst first day of her life; who split every dessert straight down the middle; whose mother — Mira now remembered, with a cold, sliding feeling — \u201cworked in safety inspection, or something.\u201d",
    "She did not scan the letter. She folded it into her pocket, which was against the rules of the job, and possibly against some larger rule she couldn't name.",
    "That night she typed and deleted four different messages to Talia. The versions ranged from casual to unforgivable. She sent none of them.",
    "Revenge, she discovered, was easy to plan and impossible to size. Should she stop sitting with Talia at lunch? That punished no one but herself. Tell the whole grade? That punished Talia, who had signed nothing. Somewhere in the middle of the night, Mira understood that anger was like the workshop's old bandsaw: powerful, precise-looking, and entirely indifferent to which fingers it took.",
    "On Sunday she returned to the box, telling herself she was only finishing the job. Page fifty-two was a copy of the same letter — but this copy still had a second page the first had lost. On it, Elena Solano had listed her reasons: a wiring fault in the finishing room, a fire exit blocked by lumber racks, a dust collector two years past its service date.",
    "Mira sat back on her heels. She had grown up on the story of the workshop's closing the way you grow up on any family story — whole, smooth, and with the sharp parts sanded off. Her father was not a liar. But the letter in her pocket and the page in her hand were both true at once, and they did not tell the same story.",
    "At school on Monday, Talia waved her over, holding two spoons and one pudding cup, and Mira felt the whole weekend rearrange itself around the gesture.",
    "\u201cYou look like you didn't sleep,\u201d Talia said, handing her a spoon.",
    "\u201cI found something,\u201d Mira said. \u201cAbout your mom. And my dad. Can I just — ask you about it? Before I decide anything?\u201d",
    "Talia's smile faded into something more serious, and more valuable. \u201cThat,\u201d she said, \u201cis the nicest thing anyone's asked me all year.\u201d"
  ],
  notes:[],

    {q:"The family discussed the workshop's closing &ldquo;the way people discuss an old injury&rdquo; (paragraph 2), suggesting the topic was",

           "completely forgotten by everyone."],

    {q:"The &ldquo;cold, sliding feeling&rdquo; in paragraph 4 conveys Mira's",
     opts:["physical chill in the storage room.",
           "dawning dread as she connects the signature to her friend.",
           "excitement at solving a mystery.",
           "relief that the job is almost finished."],
     a:1, ex:"The feeling arrives exactly as the memory clicks into place — Talia's mother and the letter-writer are the same person."},
    {q:"The main conflict Mira experiences in the passage is between",
     opts:["her schoolwork and her weekend job.",
           "her father and the licensing board.",
           "her loyalty to her father and her friendship with Talia.",
           "her own memory and her father's memory."],

    {q:"Mira's typing and deleting of four messages (paragraph 6) primarily shows",
     opts:["her poor writing skills.",
           "that her phone was malfunctioning.",
           "that Talia was ignoring her.",
           "her inner conflict about how — and whether — to confront Talia."],
     a:3, ex:"Four drafts &ldquo;from casual to unforgivable,&rdquo; none sent: she cannot settle on what she even wants to say."},
    {q:"The comparison of anger to the workshop's bandsaw (paragraph 7) suggests that anger",
     opts:["is a useful tool when handled carefully.",
           "cuts without caring whom it harms — including its user.",
           "belongs only in the past.",
           "is louder than it is dangerous."],
     a:1, ex:"A bandsaw is powerful and &ldquo;indifferent to which fingers it takes&rdquo; — every revenge Mira plans wounds someone it shouldn't."},
    {q:"The second page found in paragraph 8 contributes to the passage by",
     opts:["proving that Elena Solano lied to the board.",
           "showing that Mira's father was careless with paperwork.",
           "complicating the simple story Mira grew up believing.",

    {q:"The phrase &ldquo;with the sharp parts sanded off&rdquo; (paragraph 9) suggests that family stories are often",

           "mostly about carpentry.",

{
  n:15, title:"Six Skips", byline:"an AE original story", kind:"prose",
  lines:[
    "Etta saw to the horse before she saw to herself. It was not a rule anyone had taught her in words; two winters of carrying the mountain mail had taught it to her joints. She stripped the saddle, rubbed down the gelding's steaming back with a fistful of dry grass, and checked each hoof in turn while the creek did its cold, glittering work on the mud.",
    "The gelding, satisfied, wandered to a patch of new clover and began the serious business of ignoring her.",

    "The workshop occupied what had once been a chapel, and Ines Vane had filled it to the rafters with locks.",
    "Tomas had interviewed champions before — chess players, fencers, a memory athlete who recited train timetables for fun — and they all shared a certain restlessness, as if ordinary rooms were too easy for them. Vane had it worse than any of them. While they talked, she assembled and disassembled a brass puzzle box without once looking at her hands.",
    "\u201cPeople assume I retired because I got old,\u201d she said. \u201cI retired because I ran out of opponents. Every lock I was hired to test, I opened. Every cipher, every vault, every prize puzzle in every capital city. In the last ten years of my career, I never once lost.\u201d She set the box down. \u201cYou're young. You think that sounds wonderful.\u201d",
    "\u201cIt doesn't?\u201d",
    "\u201cA game you cannot lose is not a game. It is a chore with applause.\u201d",
    "Tomas wrote that down. Outside, the wind pushed at the chapel's high windows.",
    "\u201cSo I built myself an opponent,\u201d Vane continued. \u201cIt took nine years. The east wing of this property is a maze — though \u2018maze\u2019 is a small word for it. Its walls move on schedules I wrote and then deliberately destroyed. It rearranges itself. I taught it my habits, and then I taught it to punish them. There was exactly one copy of its logic, and I shredded that copy on my sixtieth birthday.\u201d",
    "\u201cThen no one alive knows the way through it.\u201d",
    "\u201cCorrect,\u201d said Vane, with the satisfaction of a craftsman admiring a joint. \u201cIncluding me. Especially me.\u201d",
    "Tomas's pen stopped. \u201cBut you go in.\u201d",
    "\u201cEvery year. The first of March. I take three days of water and a whistle I have never had to use.\u201d She smiled, and the smile was the youngest thing in her weathered face. \u201cPeople climb mountains that could kill them, and the world calls it sport. My mountain happens to be indoors, and I built it to know me. I have never felt so evenly matched in my life.\u201d",
    "\u201cAnd if one year the maze wins?\u201d",
    "Vane picked the brass box back up. Click, click, open. \u201cThen it will have been a perfect game,\u201d she said, \u201cand I will finally have met my equal. Would you like to see the door?\u201d",
    "Tomas looked at his notebook, at the chapel's long shadows, at the small, satisfied woman across the table — and discovered that some invitations frighten you precisely because part of you wants to say yes."

    "Ana got home at noon with the violin case in one hand and the story crowding up her throat like a crowd at a narrow door.",
    "Her mother listened to all of it at the kitchen table — the pawnshop with the crooked awning, the three afternoons of watching from the laundromat across the street, the phone call to Officer Duval, the clerk's face when the serial number matched. She did not interrupt once, which Ana knew, from twelve years of experience, was not the same thing as approval.",
    "\u201cSo the school gets its violin back,\u201d her mother said at last, \u201cand Ms. Ferreira gets her best student back onstage for the spring concert. And what did it cost?\u201d",
    "\u201cNothing! That's the whole point. The reward is two hundred dollars, and I didn't spend a cent —\u201d",
    "\u201cI didn't ask what you spent. I asked what it cost.\u201d",
    "Ana opened her mouth, and closed it.",
    "\u201cThree afternoons across the street from a man you believed to be a thief,\u201d her mother said, in the level voice she used for arithmetic. \u201cAlone. Telling no one. If the clerk had noticed a girl in the laundromat window — noticed her three days running —\u201d She stopped, and let the sentence finish itself in the quiet.",
    "\u201cBut he didn't notice.\u201d",
    "\u201cNo. And so today we get to have this conversation, instead of a very different one.\u201d Her mother reached over and unlatched the case. The violin lay in its velvet like something asleep. \u201cDo you know what I see when I look at this? Four strings, a bridge, a body of maple. Every part of it can be replaced. When a string snaps, Ms. Ferreira does not hold a funeral. She opens a drawer.\u201d",
    "\u201cI'm not a violin string, Mama.\u201d",
    "\u201cNo,\u201d her mother agreed. \u201cThere is no drawer that holds another you. That is the entire speech, and you have just given it to yourself.\u201d",
    "Ana looked at the instrument for a while. \u201cThe reward's real, though,\u201d she said finally. \u201cTwo hundred dollars.\u201d",

    "Ana laughed, mostly from relief, and the crowd of the story finally fit through the door."
